name: ci
on:
    push:
       branches: [main]


jobs:                                   
  build:                            
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: run ci
        run: npm ci
            
      - name: run tests
        run: npm test

      # - name: linter
      #   run: npm run lints
        
        